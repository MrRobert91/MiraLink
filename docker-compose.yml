services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      # Rutas del binario y los modelos de Piper horneados en la imagen. Se fijan
      # aquí (environment tiene prioridad sobre env_file) para que un ./backend/.env
      # copiado de .env.example no las sobrescriba con valores locales.
      PIPER_BIN: /app/piper/piper
      TTS_MODELS_DIR: /app/models
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:80"

volumes:
  backend-data:

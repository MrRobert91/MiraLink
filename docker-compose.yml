services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:80"

volumes:
  backend-data:
